
<form>

    <h1>Registration Form</h1>

    <label>Name:</label>
    <input type="text" placeholder="Enter your name"><br><br>

    <label>Select Date:</label>
    <input type="date"><br><br>

    <label>Select Week:</label>
    <input type="week"><br><br>

    <label>Select Time:</label>
    <input type="time"><br><br>

    <label>Select Month:</label>
    <input type="month"><br><br>

    <label>Date of Birth:</label>
    <input type="datetime-local"><br><br>

    <label>Age:</label>
    <input type="number" placeholder="Enter age"><br><br>

    <label>Email:</label>
    <input type="email" placeholder="Enter email"><br><br>

    <label>Password:</label>
    <input type="password"><br><br>

    <label>Mobile Number:</label>
    <input type="tel"><br><br>

    <label>Gender:</label>
    <input type="radio" name="gender">Male
    <input type="radio" name="gender">Female
    <br><br>

    <label>Courses:</label><br>
    <input type="checkbox" name="course" value="html">HTML<br>
    <input type="checkbox" name="course" value="css">CSS<br>
    <input type="checkbox" name="course" value="js">JavaScript<br>
    <input type="checkbox" name="course" value="react">React<br>
    <input type="checkbox" name="course" value="java">Java<br><br>

    <label>Favorite Color:</label>
    <input type="color"><br><br>

    <label>Upload Resume:</label>
    <input type="file"><br><br>

    <label>Search:</label>
    <input type="search">
    <input type="button" value="Search"><br><br>

    <label>Portfolio URL:</label>
    <input type="url"><br><br>

    <label>English Level:</label>
    Low <input type="range"> Expert
    <br><br>

    <input type="reset">
    <input type="submit">

</form>
