<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant - Reservation & Feedback Form</title>
</head>
<body>
    <nav>
        <ul>
            <li>
                <a href="menu.html">Menu</a>
                <a href="reservation.html">Reservation</a>
                <a href="contact.html">Contact Us</a>
                <a href="wiki.html">Wiki</a>

                <a href="website.html">restaurant</a>
                <a href="Form.html">Form</a>
            </li>
        </ul>

    <h1>Restaurant Table Reservation Form</h1>

    <!-- <form oninput="total.value = num_guests.value * 25"> -->
        <fieldset>
            <legend>Customer Information</legend>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname" required><br><br>

            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" required><br><br>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="987-654-3210"><br><br>
        </fieldset>

        <fieldset>
            <legend>Booking Details</legend>
            <label for="date">Reservation Date:</label>
            <input type="date" id="date" name="date" min="2026-03-12"><br><br>

            <label for="time">Reservation Time:</label>
            <input type="time" id="time" name="time"><br><br>

            <label for="num_guests">Number of Guests (Max 20):</label>
            <input type="number" id="num_guests" name="num_guests" min="1" max="20" value="2"><br><br>

            <label>Estimated Total Cost ($25/person)</label>
            <output name="total" for="num_guests">total</output><br><br>

            <label for="table_pref">Table Preference:</label>
            <select id="table_pref" name="table_pref">
                <optgroup label="Indoor">
                    <option value="window">Window Side</option>
                    <option value="center">Center</option>
                    <option value="private">Private Room</option>
                </optgroup>
                <optgroup label="Outdoor">
                    <option value="terrace">Terrace</option>
                    <option value="garden">Garden</option>
                </optgroup>
            </select><br><br>

            <label for="cuisine">Your favorite cuisine:</label>
            <input list="cuisines" name="cuisine" id="cuisine">
            <datalist id="cuisines">
                <option value="Italian">
                <option value="Chinese">
                <option value="Indian">
                <option value="French">
                <option value="Japanese">
            </datalist><br><br>
        </fieldset>

        <fieldset>
            <legend>Food & Drinks</legend>
            <label>Dietary Preferences:</label><br>
            <input type="checkbox" id="veg" name="diet" value="veg">
            <label for="veg"> Vegetarian</label><br>
            <input type="checkbox" id="vegan" name="diet" value="vegan">
            <label for="vegan"> Vegan</label><br>
            <input type="checkbox" id="glutenfree" name="diet" value="glutenfree">
            <label for="glutenfree"> Gluten-Free</label><br><br>

            <label>Smoker:</label>
            <input type="radio" id="yes" name="smoker" value="yes">
            <label for="yes">Yes</label>
            <input type="radio" id="no" name="smoker" value="no" checked>
            <label for="no">No</label><br><br>

            <label for="special_request">Special Requests:</label><br>
            <textarea id="special_request" name="special_request" rows="4" cols="50" placeholder="Any allergy or special celebration?"></textarea><br><br>

            <label for="rating">Rate our website (1-10):</label>
            <input type="range" id="rating" name="rating" min="1" max="10" value="8"><br><br>

            <label for="fav_color">Theme Color for Voucher:</label>
            <input type="color" id="fav_color" name="fav_color" value="#00000"><br><br>

            <label for="identity">Upload Identity Proof (Optional):</label>
            <input type="file" id="identity" name="identity"><br><br>
        </fieldset>

        <br>
        <button type="button" onclick="alert('Table Reserved Successfully!')">Check Availability</button>
        <input type="submit" value="Confirm Booking">
        <input type="reset" value="Clear Form">
    <!-- </form> -->

</body>
</html>
